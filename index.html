<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Бидний өрөө</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --text-main: #242424; --text-muted: #6b6b6b; --bg-main: #ffffff; --bg-sec: #f9f9f9; --border: #e6e6e6; --accent: #111111; --accent-hover: #444444; }
  body { font-family: 'Inter', sans-serif; background: var(--bg-main); color: var(--text-main); min-height: 100vh; line-height: 1.6; }

  /* Header & Navigation */
  header { background: var(--bg-main); padding: 0 2rem; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border); }
  .header-top { display: flex; align-items: center; justify-content: space-between; padding: 1.2rem 0; border-bottom: 1px solid var(--border); }
  .logo-container { cursor: pointer; display: inline-block; }
  .logo { font-family: 'Lora', serif; font-size: 1.8rem; font-weight: 700; letter-spacing: -0.02em; color: var(--text-main); }
  .logo span { font-style: italic; font-weight: 500; color: var(--text-muted); }
  .logo-sub { font-size: 0.7rem; color: var(--text-muted); letter-spacing: 0.12em; text-transform: uppercase; margin-top: 4px; font-weight: 500; }
  .header-date { font-size: 0.8rem; color: var(--text-muted); letter-spacing: 0.05em; font-weight: 500; }
  .header-actions { display: flex; gap: 0.75rem; align-items: center; }
  .btn { padding: 0.5rem 1.2rem; border-radius: 4px; border: none; cursor: pointer; font-family: 'Inter', sans-serif; font-size: 0.85rem; font-weight: 500; transition: all 0.2s; }
  .btn-outline { background: transparent; border: 1px solid var(--text-main); color: var(--text-main); }
  .btn-outline:hover { background: var(--text-main); color: var(--bg-main); }
  nav { display: flex; gap: 2rem; padding: 1rem 0; overflow-x: auto; scrollbar-width: none; }
  nav::-webkit-scrollbar { display: none; }
  nav a { color: var(--text-muted); text-decoration: none; font-size: 0.85rem; letter-spacing: 0.05em; white-space: nowrap; transition: color 0.2s; cursor: pointer; font-weight: 500; text-transform: uppercase; }
  nav a:hover, nav a.active { color: var(--accent); font-weight: 600; }

  /* Banner */
  .banner { position: relative; height: 500px; overflow: hidden; background: var(--bg-sec); }
  .slide { position: absolute; inset: 0; opacity: 0; transition: opacity 0.8s ease; display: flex; align-items: center; justify-content: center; }
  .slide.active { opacity: 1; z-index: 1; }
  .slide-img { position: absolute; inset: 0; background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; font-size: 7rem; }
  .slide-overlay { position: absolute; inset: 0; background: rgba(0, 0, 0, 0.4); }
  .slide-content { position: relative; z-index: 2; padding: 2.5rem; max-width: 800px; text-align: center; cursor: pointer; }
  .slide-tag { display: inline-block; font-size: 0.75rem; letter-spacing: 0.1em; padding: 0.4rem 0.8rem; margin-bottom: 1rem; color: #fff; border: 1px solid rgba(255,255,255,0.5); text-transform: uppercase; border-radius: 2px; }
  .slide-title { font-family: 'Lora', serif; font-size: clamp(1.8rem, 4vw, 3rem); font-weight: 700; color: #fff; line-height: 1.3; margin-bottom: 1rem; text-shadow: 0 2px 10px rgba(0,0,0,0.2); }
  .slide-meta { font-size: 0.85rem; color: rgba(255,255,255,0.8); font-weight: 500; }
  .banner-nav { position: absolute; bottom: 1.5rem; left: 50%; transform: translateX(-50%); display: flex; gap: 0.6rem; z-index: 10; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.4); border: none; cursor: pointer; transition: all 0.3s; padding: 0; }
  .dot.active { background: #fff; transform: scale(1.3); }

  /* Grid & Cards */
  .section-label { font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-main); font-weight: 600; padding: 1.5rem 0 0.5rem; max-width: 1200px; margin: 0 auto; border-bottom: 1px solid var(--border); }
  main { max-width: 1200px; margin: 0 auto; padding: 2.5rem 0; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2.5rem 2rem; }
  .card { cursor: pointer; }
  .card-img-wrapper { overflow: hidden; border-radius: 4px; margin-bottom: 1.2rem; }
  .card-img { width: 100%; aspect-ratio: 16/10; object-fit: cover; display: block; transition: transform 0.4s ease; }
  .card-img-placeholder { width: 100%; aspect-ratio: 16/10; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; background: var(--bg-sec); }
  .card-tag { font-size: 0.7rem; letter-spacing: 0.08em; color: var(--text-muted); text-transform: uppercase; font-weight: 600; margin-bottom: 0.5rem; }
  .card-title { font-family: 'Lora', serif; font-size: 1.3rem; font-weight: 700; line-height: 1.4; margin-bottom: 0.6rem; color: var(--text-main); }
  .card-excerpt { font-size: 0.95rem; color: var(--text-muted); line-height: 1.6; margin-bottom: 1rem; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  .card-featured { grid-column: span 2; display: grid; grid-template-columns: 1.2fr 1fr; gap: 2rem; align-items: center; }

  /* Article View */
  .article-view { display: none; }
  .article-view.open { display: block; animation: fadeIn 0.4s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .article-header { max-width: 800px; margin: 0 auto 2.5rem; text-align: center; }
  .article-title-h { font-family: 'Lora', serif; font-size: clamp(2rem, 4vw, 3.5rem); font-weight: 700; line-height: 1.2; margin-bottom: 1.5rem; }
  .article-body { max-width: 700px; margin: 0 auto; font-family: 'Lora', serif; font-size: 1.15rem; line-height: 1.8; color: var(--text-main); }

  /* Reactions & Comments */
  .reactions { display: flex; gap: 1rem; margin: 3rem 0 2rem; justify-content: center; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); padding: 1.5rem 0; }
  .react-btn { display: flex; align-items: center; gap: 0.5rem; background: var(--bg-sec); border: 1px solid var(--border); border-radius: 100px; padding: 0.5rem 1.2rem; cursor: pointer; transition: 0.2s; }
  .react-btn.reacted { background: var(--text-main); color: #fff; }
  .comment { padding: 1.5rem 0; border-bottom: 1px solid var(--border); }

  /* Admin */
  .admin-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
  .admin-overlay.open { display: flex; }
  .admin-panel { background: #fff; width: 90%; max-width: 700px; max-height: 90vh; overflow-y: auto; border-radius: 8px; padding: 2.5rem; }
  .admin-input, .admin-textarea, .admin-select { width: 100%; padding: 0.8rem; border: 1px solid var(--border); border-radius: 4px; margin-bottom: 1.2rem; font-family: inherit; }

  footer { background: var(--bg-main); color: var(--text-muted); text-align: center; padding: 4rem 2rem; border-top: 1px solid var(--border); margin-top: 5rem; }
  .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 0.8rem 1.5rem; border-radius: 100px; opacity: 0; transition: 0.3s; pointer-events: none; z-index: 1000; }
  .toast.show { opacity: 1; bottom: 3rem; }

  @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } .card-featured { grid-column: span 1; grid-template-columns: 1fr; } }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="logo-container" onclick="goHome()">
      <div class="logo">Бидний <span>өрөө</span></div>
      <div class="logo-sub">Уран зохиол · Яруу найраг · Философи</div>
    </div>
    <div class="header-date" id="header-date"></div>
    <div class="header-actions">
      <button class="btn btn-outline" onclick="openAdmin()">✍ Нийтлэх</button>
    </div>
  </div>
  <nav id="main-nav">
    <a class="active" onclick="filterCat('Бүгд')">Бүгд</a>
    <a onclick="filterCat('Уран зохиол')">Уран зохиол</a>
    <a onclick="filterCat('Яруу найраг')">Яруу найраг</a>
    <a onclick="filterCat('Эссэ')">Эссэ</a>
    <a onclick="filterCat('Философи')">Философи</a>
    <a onclick="filterCat('Уран зураг')">Уран зураг</a>
    <a onclick="filterCat('Орчуулга')">Орчуулга</a>
  </nav>
</header>

<div class="banner" id="banner">
  <div id="banner-slides"></div>
  <div class="banner-nav" id="banner-dots"></div>
</div>

<div class="article-view" id="article-view">
  <main>
    <button class="back-btn" onclick="goHome()" style="margin-bottom: 2rem; cursor: pointer; border: none; background: none;">← Буцах</button>
    <div id="article-content-area"></div>
    <div class="reactions" id="reactions-bar"></div>
    <div class="comments-section">
      <h3 style="font-family: 'Lora', serif; margin-bottom: 1.5rem;">Хэлэлцүүлэг</h3>
      <div class="comment-form">
        <textarea id="comment-text" class="admin-textarea" placeholder="Санал бодлоо хуваалцаарай..."></textarea>
        <input type="text" id="comment-name" class="admin-input" placeholder="Таны нэр (заавал биш)">
        <button class="btn-submit btn" style="background: var(--accent); color: #fff;" onclick="submitComment()">Илгээх</button>
      </div>
      <div id="comments-list" style="margin-top: 2rem;"></div>
    </div>
  </main>
</div>

<div id="home-view">
  <div class="section-label" id="section-title">Сүүлийн нийтлэлүүд</div>
  <main><div id="posts-grid"></div></main>
</div>

<div class="admin-overlay" id="admin-overlay">
  <div class="admin-panel" id="admin-inner"></div>
</div>

<div class="toast" id="toast"></div>

<footer>
  <p><strong>Бидний өрөө</strong> — 2026</p>
  <p style="font-style: italic; margin-top: 0.5rem;">"Урлаг бол сэтгэлийн хэл"</p>
</footer>

<script>
// 1. FIREBASE CONFIG (Таны өгсөн мэдээлэл)
const firebaseConfig = {
  apiKey: "AIzaSyCz_I7-HpvD2D5zpje8BC9ayobGJG2R3R4",
  authDomain: "bidnii-uruu.firebaseapp.com",
  projectId: "bidnii-uruu",
  storageBucket: "bidnii-uruu.firebasestorage.app",
  messagingSenderId: "732340022272",
  appId: "1:732340022272:web:7afa81731759b09c7f3ce5",
  measurementId: "G-67WK1E0X5W"
};

// 2. INITIALIZE
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let posts = [];
let currentPost = null;
let currentCat = 'Бүгд';
let slideIndex = 0;
const ADMIN_PASSWORD = 'bidniiuroo2026';

// 3. LOAD DATA
window.onload = () => {
  const now = new Date();
  const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
  document.getElementById('header-date').textContent = now.toLocaleDateString('mn-MN', options);

  // Real-time listener
  db.collection("posts").orderBy("date", "desc").onSnapshot((snapshot) => {
    posts = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    renderAll();
    if(currentPost) {
      currentPost = posts.find(p => p.id === currentPost.id);
      renderReactions();
      renderComments();
    }
  });
};

function renderAll() {
  renderBanner();
  renderGrid();
}

function renderBanner() {
  const slidesEl = document.getElementById('banner-slides');
  const dotsEl = document.getElementById('banner-dots');
  const featured = posts.slice(0, 5);
  if (!featured.length) {
    slidesEl.innerHTML = '<div class="slide active"><div class="slide-overlay"></div><div class="slide-content"><div class="slide-title">Тавтай морил</div></div></div>';
    return;
  }
  slidesEl.innerHTML = featured.map((p, i) => `
    <div class="slide ${i === slideIndex ? 'active' : ''}">
      <div class="slide-img" style="background-color:${p.color || '#333'}; ${p.imageUrl ? `background-image:url('${p.imageUrl}')` : ''}">${p.imageUrl ? '' : (p.emoji || '📖')}</div>
      <div class="slide-overlay"></div>
      <div class="slide-content" onclick="openArticle('${p.id}')">
        <div class="slide-tag">${p.category}</div>
        <div class="slide-title">${p.title}</div>
      </div>
    </div>`).join('');
  dotsEl.innerHTML = featured.map((_, i) => `<button class="dot ${i === slideIndex ? 'active' : ''}" onclick="goSlide(${i})"></button>`).join('');
}

function renderGrid() {
  const el = document.getElementById('posts-grid');
  const filtered = currentCat === 'Бүгд' ? posts : posts.filter(p => p.category === currentCat);
  if (!filtered.length) {
    el.innerHTML = '<div class="empty-state" style="text-align:center; padding: 3rem;">Нийтлэл байхгүй байна.</div>';
    return;
  }
  el.innerHTML = `<div class="grid">${filtered.map((p, i) => i === 0 && currentCat === 'Бүгд' ? featuredCard(p) : smallCard(p)).join('')}</div>`;
}

function featuredCard(p) {
  return `<div class="card card-featured" onclick="openArticle('${p.id}')">
    <div class="card-img-wrapper">
      <div class="card-img-placeholder" style="background:${p.color || '#eee'}; color:#fff;">${p.imageUrl ? `<img src="${p.imageUrl}" class="card-img">` : (p.emoji || '📖')}</div>
    </div>
    <div>
      <div class="card-tag">${p.category}</div>
      <div class="card-title">${p.title}</div>
      <div class="card-excerpt">${p.excerpt}</div>
    </div>
  </div>`;
}

function smallCard(p) {
  return `<div class="card" onclick="openArticle('${p.id}')">
    <div class="card-img-wrapper">
      <div class="card-img-placeholder" style="background:${p.color || '#eee'}; color:#fff;">${p.imageUrl ? `<img src="${p.imageUrl}" class="card-img">` : (p.emoji || '📖')}</div>
    </div>
    <div class="card-tag">${p.category}</div>
    <div class="card-title">${p.title}</div>
    <div class="card-excerpt">${p.excerpt}</div>
  </div>`;
}

// 4. ARTICLE ACTIONS
function openArticle(id) {
  currentPost = posts.find(p => p.id === id);
  document.getElementById('home-view').style.display = 'none';
  document.getElementById('banner').style.display = 'none';
  document.getElementById('article-view').classList.add('open');
  
  const p = currentPost;
  document.getElementById('article-content-area').innerHTML = `
    <div class="article-header">
      <div class="article-tag">${p.category}</div>
      <h1 class="article-title-h">${p.title}</h1>
      <p style="font-style: italic; color: #666; margin-bottom: 2rem;">${p.excerpt}</p>
    </div>
    ${p.imageUrl ? `<img src="${p.imageUrl}" style="width:100%; border-radius:8px; margin-bottom:2rem;">` : ''}
    <div class="article-body">${p.body.replace(/\n/g, '<br>')}</div>
  `;
  renderReactions();
  renderComments();
  window.scrollTo(0,0);
}

function goHome() {
  document.getElementById('home-view').style.display = 'block';
  document.getElementById('banner').style.display = 'block';
  document.getElementById('article-view').classList.remove('open');
  currentPost = null;
}

function renderReactions() {
  const p = currentPost;
  const reacts = p.reactions || { like: 0, love: 0, wow: 0 };
  const storageKey = 'reacted_' + p.id;
  const myReacts = JSON.parse(localStorage.getItem(storageKey) || '{}');
  
  document.getElementById('reactions-bar').innerHTML = ['like', 'love', 'wow'].map(type => {
    const emojis = { like: '👍', love: '❤️', wow: '😮' };
    return `<button class="react-btn ${myReacts[type] ? 'reacted' : ''}" onclick="handleReact('${type}')">
      ${emojis[type]} <span>${reacts[type] || 0}</span>
    </button>`;
  }).join('');
}

async function handleReact(type) {
  const p = currentPost;
  const storageKey = 'reacted_' + p.id;
  let myReacts = JSON.parse(localStorage.getItem(storageKey) || '{}');
  let change = myReacts[type] ? -1 : 1;

  await db.collection("posts").doc(p.id).update({
    [`reactions.${type}`]: firebase.firestore.FieldValue.increment(change)
  });

  if (myReacts[type]) delete myReacts[type]; else myReacts[type] = true;
  localStorage.setItem(storageKey, JSON.stringify(myReacts));
}

async function submitComment() {
  const text = document.getElementById('comment-text').value.trim();
  const name = document.getElementById('comment-name').value.trim() || "Нэргүй";
  if(!text) return;

  await db.collection("posts").doc(currentPost.id).update({
    comments: firebase.firestore.FieldValue.arrayUnion({
      name, text, date: new Date().toLocaleString('mn-MN')
    })
  });
  document.getElementById('comment-text').value = '';
  showToast("Сэтгэгдэл илгээгдлээ");
}

function renderComments() {
  const list = document.getElementById('comments-list');
  const comments = currentPost.comments || [];
  list.innerHTML = comments.map(c => `
    <div class="comment">
      <div style="font-weight:600;">${c.name}</div>
      <div style="font-size:0.8rem; color:#999; margin-bottom:0.5rem;">${c.date}</div>
      <div>${c.text}</div>
    </div>
  `).join('') || "Сэтгэгдэл байхгүй байна.";
}

// 5. ADMIN ACTIONS
function openAdmin() {
  document.getElementById('admin-overlay').classList.add('open');
  renderLoginForm();
}

function renderLoginForm() {
  document.getElementById('admin-inner').innerHTML = `
    <h2 class="admin-title">Нэвтрэх</h2>
    <input type="password" id="pw-input" class="admin-input" placeholder="Нууц үг">
    <div style="display:flex; gap:1rem;">
      <button class="btn" onclick="checkPw()">Орох</button>
      <button class="btn btn-outline" onclick="closeAdmin()">Болих</button>
    </div>
  `;
}

function checkPw() {
  if (document.getElementById('pw-input').value === ADMIN_PASSWORD) renderPostForm();
  else showToast("Нууц үг буруу");
}

function renderPostForm() {
  document.getElementById('admin-inner').innerHTML = `
    <h2 class="admin-title">Шинэ нийтлэл</h2>
    <input id="f-title" class="admin-input" placeholder="Гарчиг *">
    <input id="f-excerpt" class="admin-input" placeholder="Товч агуулга *">
    <select id="f-cat" class="admin-select">
      <option>Уран зохиол</option><option>Яруу найраг</option><option>Эссэ</option>
      <option>Философи</option><option>Уран зураг</option><option>Орчуулга</option>
    </select>
    <textarea id="f-body" class="admin-textarea" style="height:200px" placeholder="Агуулга *"></textarea>
    <input id="f-img" class="admin-input" placeholder="Зургийн URL (заавал биш)">
    <button class="btn" onclick="publishPost()">Нийтлэх</button>
  `;
}

async function publishPost() {
  const post = {
    title: document.getElementById('f-title').value,
    excerpt: document.getElementById('f-excerpt').value,
    category: document.getElementById('f-cat').value,
    body: document.getElementById('f-body').value,
    imageUrl: document.getElementById('f-img').value,
    date: new Date().toISOString(),
    reactions: { like:0, love:0, wow:0 },
    comments: [],
    color: '#'+Math.floor(Math.random()*16777215).toString(16)
  };
  await db.collection("posts").add(post);
  closeAdmin();
  showToast("Амжилттай нийтлэгдлээ");
}

function closeAdmin() { document.getElementById('admin-overlay').classList.remove('open'); }
function showToast(m) { const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),3000); }
function filterCat(c) { currentCat=c; document.querySelectorAll('#main-nav a').forEach(a=>a.classList.toggle('active', a.textContent===c)); renderGrid(); }
function goSlide(i) { slideIndex=i; renderBanner(); }
</script>
</body>
</html>
